{% extends "base.html" %}
{% import "bootstrap/wtf.html" as wtf %}

{% block title %}Sifre Guncelle{% endblock %}

{% block content %}
<section class="form-panel">
  <div class="form-heading">
    <p class="eyebrow">Admin</p>
    <h1>Kullanici Sifresi</h1>
    <p class="form-note">{{ user.email }} hesabi icin yeni sifre belirleyin.</p>
  </div>
  {{ wtf.quick_form(form) }}
  <a class="subtle-link" href="{{ url_for('admin.list_users') }}">Kullanici listesine don</a>
</section>
{% endblock %}
